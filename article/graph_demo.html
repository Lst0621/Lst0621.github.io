<!DOCTYPE html>
<head>
  <title>Graph Demo</title>
  <link rel="icon" href="../img/flame1.png">
  <link rel="stylesheet" href="../resource/solarized_light.css">
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9BLVHLETMC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag('js', new Date());
    gtag('config', 'G-9BLVHLETMC');
  </script>
  <style>
    :root {
      --cell0: #fdf6e3;
      --cell1: #eee8d5;
      --cellDisabled: #e4ddc8;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.35;
    }

    .row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      margin: 12px 0;
    }

    .controls button, .controls input[type="checkbox"] {
      accent-color: var(--accent);
    }

    table {
      border-collapse: collapse;
      margin: 0 auto;
    }

    td {
      border: 1px solid var(--border);
      padding: 6px 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      user-select: none;
    }
  </style>
</head>
<body class="solarized">
<div class="wrap">
  <h1 style="margin: 0; font-size: 18pt; font-weight: 500; font-family: ui-monospace, Courier;">
    Graph Demo
  </h1>
  <div class="subtitle">
    Click adjacency matrix entries to add/remove edges in an undirected graph.
  </div>

  <div id="controls" class="controls panel"></div>

  <div class="row">
    <div class="panel">
      <span id="graph_text">Loading...</span>
      <div style="height: 10px;"></div>
      <canvas id="graph_canvas" width="700" height="440"></canvas>
    </div>
    <div class="panel">
      <div style="margin-bottom: 8px; color: var(--muted); font-family: ui-monospace, Courier;">Adjacency</div>
      <table id="adj_table"></table>
      <div style="height: 12px;"></div>
      <div style="margin-bottom: 8px; color: var(--muted); font-family: ui-monospace, Courier;">Shortest paths</div>
      <table id="dist_table"></table>
      <div style="height: 12px;"></div>
      <div style="margin-bottom: 8px; color: var(--muted); font-family: ui-monospace, Courier;">Edge-to-node distances (min endpoint)</div>
      <table id="edge_dist_table"></table>
    </div>
  </div>

  <div style="margin-top: 14px;">
    <a href="../index.html">Back</a>
  </div>
</div>

<script type="module" src="/assets/js/page/graph_demo.js"></script>
</body>

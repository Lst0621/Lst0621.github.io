<!DOCTYPE html>
<head>
  <title>Graph Demo</title>
  <link rel="icon" href="../img/flame1.png">
  <link rel="stylesheet" href="../resource/solarized_light.css">
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9BLVHLETMC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag('js', new Date());
    gtag('config', 'G-9BLVHLETMC');
  </script>
  <style>
    :root {
      --cell0: #fdf6e3;
      --cell1: #eee8d5;
      --cellDisabled: #e4ddc8;
    }
  </style>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']]
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 14px;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.35;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      margin: 10px 0;
    }

    .controls button, .controls input[type="checkbox"] {
      accent-color: var(--accent);
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(240px, auto);
      gap: 14px;
      align-items: start;
      justify-content: center;
    }

    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    .main-col-graph {
      min-width: 0;
    }

    .main-col-tables {
      min-width: 0;
    }

    .matrix-wrap table {
      border-collapse: collapse;
      margin: 0 auto;
    }

    .matrix-wrap td {
      border: 1px solid var(--border);
      padding: 3px 5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      user-select: none;
    }

    .matrix-caption {
      margin-top: 8px;
      margin-bottom: 4px;
      color: var(--muted);
      font-family: ui-monospace, Courier;
      font-size: 12px;
      line-height: 1.3;
    }
  </style>
</head>
<body class="solarized">
<div class="wrap">
  <h1 style="margin: 0; font-size: 18pt; font-weight: 500; font-family: ui-monospace, Courier;">
    Graph Demo
  </h1>
  <div class="subtitle">
    Click adjacency matrix entries to add/remove edges in an undirected graph.
  </div>

  <div id="controls" class="controls panel"></div>

  <div class="main-grid">
    <div class="panel main-col-graph">
      <div id="graph_text"></div>
      <div id="graph-summary"></div>
      <div style="height: 8px;"></div>
      <canvas id="graph_canvas" width="560" height="360"></canvas>
    </div>
    <div class="panel main-col-tables">
      <div class="matrix-wrap">
        <div style="margin-bottom: 6px; color: var(--muted); font-family: ui-monospace, Courier; font-size: 12px;">Adjacency</div>
        <table id="adj_table"></table>
      </div>
      <div class="matrix-caption">
        Shortest paths (rows 1–n) and edge–node min distances (edge rows, label u–v).
      </div>
      <div class="matrix-wrap">
        <table id="dist_edge_table"></table>
      </div>
    </div>
  </div>

  <div style="margin-top: 12px;">
    <a href="../index.html">Back</a>
  </div>
</div>

<script type="module" src="/assets/js/page/graph_demo.js"></script>
</body>

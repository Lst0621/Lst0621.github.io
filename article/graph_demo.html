<!DOCTYPE html>
<head>
  <title>Graph Demo</title>
  <link rel="icon" href="../img/flame1.png">
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9BLVHLETMC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag('js', new Date());
    gtag('config', 'G-9BLVHLETMC');
  </script>
  <style>
    :root {
      /* Solarized Light-inspired */
      --bg: #fdf6e3;
      --panel: #eee8d5;
      --text: #073642;
      --muted: #586e75;
      --border: #93a1a1;
      --accent: #268bd2;
      --accent2: #b58900;
      --cell0: #fdf6e3;
      --cell1: #eee8d5;
      --cellDisabled: #e4ddc8;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    a { color: var(--accent); }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.35;
    }

    .row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      margin: 12px 0;
    }

    .controls button, .controls input[type="checkbox"] {
      accent-color: var(--accent);
    }

    .controls button {
      background: #f7f0dc;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
    }

    .controls button:hover {
      border-color: var(--accent);
    }

    canvas {
      background: #f7f0dc;
      border: 1px solid var(--border);
      border-radius: 10px;
      display: block;
      margin: 0 auto;
    }

    table {
      border-collapse: collapse;
      margin: 0 auto;
    }

    td {
      border: 1px solid var(--border);
      padding: 6px 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      user-select: none;
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1 style="margin: 0; font-size: 18pt; font-weight: 500; font-family: ui-monospace, Courier;">
    Graph Demo
  </h1>
  <div class="subtitle">
    Click adjacency matrix entries to add/remove edges. Switch between undirected and directed; when switching from directed to undirected, an undirected edge exists if either direction exists.
  </div>

  <div id="controls" class="controls panel"></div>

  <div class="row">
    <div class="panel">
      <span id="graph_text">Loading...</span>
      <div style="height: 10px;"></div>
      <canvas id="graph_canvas" width="640" height="480"></canvas>
    </div>
    <div class="panel">
      <div style="margin-bottom: 8px; color: var(--muted); font-family: ui-monospace, Courier;">Adjacency</div>
      <table id="adj_table"></table>
      <div style="height: 12px;"></div>
      <div style="margin-bottom: 8px; color: var(--muted); font-family: ui-monospace, Courier;">Shortest paths</div>
      <table id="dist_table"></table>
    </div>
  </div>

  <div style="margin-top: 14px;">
    <a href="../index.html">Back</a>
  </div>
</div>

<script type="module" src="../lib/page/graph_demo.js"></script>
</body>

<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <title>Inverse Kinematics</title>
    <link rel="icon" href="../img/flame1.png">
    <link rel="stylesheet" href="../resource/solarized_light.css">
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9BLVHLETMC"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-9BLVHLETMC');
    </script>
    <style>
        .ik-shell {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            justify-content: center;
            margin: 0 12px;
        }

        #ik-canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border: 12px solid var(--panel);
            cursor: crosshair;
            box-sizing: border-box;
        }

        .ik-panel {
            width: 320px;
            padding: 10px;
            text-align: left;
            box-sizing: border-box;
        }

        .ik-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        .ik-row input {
            width: 100%;
            box-sizing: border-box;
        }

        #ik-status {
            min-height: 22px;
            margin-bottom: 10px;
            font-variant-numeric: tabular-nums;
        }

        @media (max-width: 980px) {
            .ik-shell {
                flex-direction: column;
                align-items: center;
            }

            .ik-panel {
                width: min(760px, 100%);
            }
        }
    </style>
</head>

<body class="solarized">
<h1 style="margin-top: 10px;" align="center">
    <span style="font-size: 24pt;">Inverse Kinematics</span>
</h1>

<div class="ik-shell">
    <canvas id="ik-canvas" width="760" height="520"></canvas>
    <div class="panel ik-panel">
        <div id="ik-status">loading</div>
        <div class="ik-row">
            <label for="ik-segments">Segments</label>
            <input id="ik-segments" type="number" min="1" max="18" step="1" value="5">
        </div>
        <div class="ik-row">
            <label for="ik-length">Length</label>
            <input id="ik-length" type="number" min="12" max="120" step="1" value="56">
        </div>
        <div class="ik-row">
            <label for="ik-iterations">Iterations</label>
            <input id="ik-iterations" type="number" min="1" max="12" step="1" value="1">
        </div>
        <div class="ik-row">
            <label for="ik-tolerance">Tolerance</label>
            <input id="ik-tolerance" type="number" min="0.05" max="20" step="0.05" value="0.75">
        </div>
        <div class="ik-row">
            <label for="ik-speed">Speed</label>
            <input id="ik-speed" type="number" min="0.5" max="60" step="0.5" value="4">
        </div>
        <button type="button" id="ik-reset" style="width: 100%;">Reset</button>
    </div>
</div>

<script type="module" src="/assets/js/page/inverse_kinematics.js"></script>

<a href="../index.html">Back</a>

</body>

name: pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: lib/package-lock.json

      - name: Install lib dependencies
        run: |
          cd lib
          npm ci

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: latest
          no-cache: true

      - name: Build WASM (CI folder)
        run: |
          cmake -S lib/tsl/wasm -B lib/tsl/wasm/wasm_out_ci \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=emcc \
            -DCMAKE_CXX_COMPILER=em++
          cmake --build lib/tsl/wasm/wasm_out_ci -j

      - name: Copy WASM outputs to assets
        run: |
          mkdir -p assets/wasm
          cp -v lib/tsl/wasm/wasm_out_ci/*.js assets/wasm/
          cp -v lib/tsl/wasm/wasm_out_ci/*.wasm assets/wasm/

      - name: Build JS (assets)
        run: |
          cd lib
          npm run build

      - name: Copy test results to assets (optional)
        run: |
          mkdir -p assets/test
          if [ -f lib/tsl/test/results.json ]; then
            cp -v lib/tsl/test/results.json assets/test/results.json
          else
            echo "No lib/tsl/test/results.json found; skipping."
          fi

      - name: Prune build-only folders (reduce Pages artifact size)
        run: |
          rm -rf lib/node_modules
          rm -rf lib/tsl/wasm/wasm_out_ci
          rm -rf lib/tsl/wasm/wasm_out_ci_emsdk506

      - name: Setup Pages
        uses: actions/configure-pages@v5.0.1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4.0.1
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.6

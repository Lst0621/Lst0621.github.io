name: pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: lib/package-lock.json

      - name: Install lib dependencies
        run: |
          cd lib
          npm ci

      - name: C++ unit tests (Google Test)
        run: |
          cd lib/tsl/wasm
          ./test_build.sh

      - name: Setup Emscripten (for Jest WASM tests)
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: latest
          no-cache: true

      - name: Build WASM (for Jest)
        run: |
          cmake -S lib/tsl/wasm -B lib/tsl/wasm/wasm_out_ci \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=emcc \
            -DCMAKE_CXX_COMPILER=em++
          cmake --build lib/tsl/wasm/wasm_out_ci -j

      - name: TypeScript unit tests (Jest)
        run: |
          cd lib
          npm test

      - name: Upload Jest JSON (for Pages)
        uses: actions/upload-artifact@v7
        with:
          name: jest_results_json
          if-no-files-found: error
          path: assets/test/results.json

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: lib/package-lock.json

      - name: Install lib dependencies
        run: |
          cd lib
          npm ci

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: latest
          no-cache: true

      - name: Build WASM (CI folder)
        run: |
          cmake -S lib/tsl/wasm -B lib/tsl/wasm/wasm_out_ci \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=emcc \
            -DCMAKE_CXX_COMPILER=em++
          cmake --build lib/tsl/wasm/wasm_out_ci -j

      - name: Copy WASM outputs to assets
        run: |
          mkdir -p assets/wasm
          cp -v lib/tsl/wasm/wasm_out_ci/*.js assets/wasm/
          cp -v lib/tsl/wasm/wasm_out_ci/*.wasm assets/wasm/

      - name: Build JS (assets)
        run: |
          cd lib
          npm run build

      - name: Download Jest JSON (from test job)
        uses: actions/download-artifact@v8
        with:
          name: jest_results_json
          path: assets/test

      - name: Prune build-only folders (reduce Pages artifact size)
        run: |
          rm -rf lib/node_modules
          rm -rf lib/tsl/wasm/wasm_out_ci
          rm -rf lib/tsl/wasm/wasm_out_ci_emsdk506

      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs:
      - test
      - build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0

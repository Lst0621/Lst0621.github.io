name: pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.MY_PAT }}

      - name: Generate history CSV
        run: bash ./scripts/site-history/get_last_commit_time.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: lib/package-lock.json

      - name: Install lib dependencies
        run: |
          cd lib
          npm ci

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v15
        with:
          # 6.0.2+ drops wasmBinary from default INCOMING_MODULE_JS_API; pin until loader is updated.
          version: 5.0.6
          actions-cache-folder: emsdk-cache


      - name: C++ unit tests (Google Test — core)
        run: |
          cd lib/tsl/core
          ./test_build.sh

      - name: C++ unit tests (Google Test — apps_geometry)
        run: |
          cd lib/tsl/apps_geometry
          ./test_build.sh

      - name: Build WASM (CI folder)
        run: |
          cmake -S lib/tsl/wasm -B lib/tsl/wasm/wasm_out_ci \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=emcc \
            -DCMAKE_CXX_COMPILER=em++
          cmake --build lib/tsl/wasm/wasm_out_ci -j

      - name: Copy WASM outputs to assets
        run: |
          mkdir -p assets/wasm
          cp -v lib/tsl/wasm/wasm_out_ci/*.js assets/wasm/
          cp -v lib/tsl/wasm/wasm_out_ci/*.wasm assets/wasm/

      - name: Build JS (assets)
        run: |
          cd lib
          npm run build

      - name: TypeScript unit tests (Jest)
        run: |
          cd lib
          npm test

      - name: Prepare Pages artifact
        run: |
          mkdir _site
          rsync -a --exclude='_site' --exclude='emsdk-cache' --exclude='lib' --exclude='.git' --exclude='.github' . _site/

      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
